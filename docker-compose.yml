# Subir tudo: docker compose up --build
# UI: http://localhost:8080  |  API direto (opcional): http://localhost:4000
# O browser fala com /graphql no mesmo host; o Nginx encaminha para o serviço `api`.
services:
  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    image: clarke-energia-api:local
    environment:
      NODE_ENV: production
      PORT: "4000"
    ports:
      - "4000:4000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 8s
      timeout: 5s
      retries: 4
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
      args:
        VITE_GRAPHQL_URL: /graphql
    image: clarke-energia-web:local
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
